<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VideoTeca VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo" id="auth-logo-ui">VIDEOTECA<span>VIP</span></div>
    <p id="auth-msg">Accede a tu cuenta</p>
    <input type="text" id="reg-name" placeholder="Tu nombre completo" style="display:none"/>
    <div class="phone-group">
      <span>+53</span>
      <input type="number" id="phone" placeholder="Número móvil"/>
    </div>
    <input type="password" id="pass" placeholder="Contraseña"/>
    <div id="auth-err" class="auth-err"></div>
    <button id="btnAuth" class="btn-red">INICIAR SESIÓN</button>
    <p id="toggleAuth">¿No tienes cuenta? <b>Regístrate aquí</b></p>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <div class="logo" id="main-logo-ui">VIDEOTECA<span>VIP</span></div>
      <div class="nav-cats" id="nav-cats"></div>
    </div>
    <div class="nav-right">
      <div class="search-box">
        <button class="search-btn" id="btn-search-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <input type="text" id="si" placeholder="Buscar..."/>
      </div>
      <button class="nbtn" id="btn-prices-open" title="Lista de Precios">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="12" y1="5" x2="12" y2="19"/><path d="M2 9h20M2 15h20"/></svg>
      </button>
      <button class="nbtn" id="btn-news-open" style="position:relative">
        <span id="news-dot" class="dot" style="display:none"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9J13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </button>
      <button class="nbtn" id="btn-cart-open">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </button>
      <button id="btn-mod" class="nbtn" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </button>
    </div>
  </nav>

  <div id="hero"></div>
  <main id="content"></main>

  <div id="ov-cart" class="overlay">
    <div class="ov-side">
      <div class="ov-head"><h3>MI PEDIDO</h3><button class="close-ov">✕</button></div>
      <div id="cart-list" class="ov-body"></div>
      <div class="cart-footer" style="padding:20px; border-top:1px solid #333">
        <div id="order-id-box" class="order-id-display" style="display:none">ID: <span id="order-id-val"></span></div>
        <div style="font-size:18px; font-weight:bold">Total: <span id="cart-total">0</span> CUP</div>
        <p class="cart-disclaimer">* Precio aproximado sujeto a variaciones por cantidad de capítulos.</p>
        <div id="cart-neg-info" style="margin-top:10px; font-size:12px; color:var(--muted)"></div>
      </div>
    </div>
  </div>

  <div id="ov-news" class="overlay">
    <div class="ov-side">
      <div class="ov-head"><h3>NOVEDADES</h3><button class="close-ov">✕</button></div>
      <div id="news-content" class="ov-body" style="line-height:1.6; white-space:pre-wrap"></div>
    </div>
  </div>

  <div id="ov-mod" class="overlay">
    <div class="ov-side" style="width:450px">
      <div class="ov-head">
        <div style="display:flex; gap:10px">
          <button class="m-tab" data-tab="to">PEDIDOS</button>
          <button class="m-tab" data-tab="tn">NEGOCIO</button>
          <button class="m-tab" data-tab="tm">MENSAJES</button>
        </div>
        <button class="close-ov">✕</button>
      </div>
      <div class="ov-body">
        <div id="mod-to" class="mod-tab-content">
          <button class="btn-red" id="clear-orders-btn" style="margin-bottom:15px; padding:8px; font-size:12px">LIMPIAR INBOX</button>
          <div id="orders-list"></div>
        </div>
        <div id="mod-tn" class="mod-tab-content" style="display:none">
          <input class="mod-input" id="neg-nombre" placeholder="Nombre del Negocio" style="width:100%; margin-bottom:10px; padding:10px"/>
          <input class="mod-input" id="neg-dir" placeholder="Dirección" style="width:100%; margin-bottom:10px; padding:10px"/>
          <input class="mod-input" id="neg-tel" placeholder="Teléfono" style="width:100%; margin-bottom:10px; padding:10px"/>
          <button class="btn-red" id="save-neg-btn">GUARDAR CONFIGURACIÓN</button>
        </div>
        <div id="mod-tm" class="mod-tab-content" style="display:none">
          <textarea id="mod-news-input" placeholder="Escribe una noticia..." style="width:100%; height:150px; padding:10px; background:#333; color:#fff; border:none"></textarea>
          <button class="btn-red" id="pub-news-btn" style="margin-top:10px">PUBLICAR</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
