<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VideoTeca VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">VIDEOTECA<span>VIP</span></div>
    <p id="auth-msg">Ingresa tus datos para entrar</p>
    
    <input type="text" id="reg-name" placeholder="Nombre completo" style="display:none"/>
    
    <div class="phone-group">
      <span>+53</span>
      <input type="number" id="phone" placeholder="Número móvil"/>
    </div>
    
    <input type="password" id="pass" placeholder="Contraseña"/>
    
    <button id="btnAuth" class="btn-red">INICIAR SESIÓN</button>
    
    <p id="toggleAuth" onclick="window.toggleAuth()">¿No tienes cuenta? <b>Regístrate aquí</b></p>
  </div>
</div>

<nav id="navbar">
  <a href="#" class="logo" onclick="location.reload()">VIDEOTECA<span>VIP</span></a>
  
  <div class="nav-right">
    <span id="uName" style="font-weight: 600; font-size: 14px; color: var(--muted);"></span>
    <button onclick="window.userLogout()" class="btn-logout" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:12px;">Cerrar Sesión</button>
    
    <button class="cart-btn" onclick="window.toggleCart()">
      <span class="cart-icon">🛒</span>
      <span id="cart-count" class="badge">0</span>
    </button>
  </div>
</nav>

<header id="hero-slider">
  </header>

<section class="filter-bar">
  <input type="text" id="search-input" placeholder="Buscar películas, series..." oninput="window.searchItems(this.value)"/>
</section>

<main id="catalog-container">
  </main>

<div id="modal-details" class="modal-overlay" onclick="window.overlayClose(event, 'modal-details')">
  <div class="modal-card">
    <div id="videoBox" class="v-box">
      </div>
    <div class="modal-info">
      <h2 id="mTitle"></h2>
      <div id="mStats" class="m-stats"></div>
      <p id="mDesc"></p>
      
      <div class="modal-actions">
        <button id="btnTrailer" class="btn-outline">🎬 VER TRÁILER</button>
        <button id="btnAddModal" class="btn-red">🛒 AÑADIR AL PEDIDO</button>
      </div>
      
      <button class="btn-close-text" onclick="window.closeModals()">VOLVER AL CATÁLOGO</button>
    </div>
  </div>
</div>

<div id="modal-qty" class="modal-overlay" onclick="window.overlayClose(event, 'modal-qty')">
  <div class="modal-card small-card">
    <h2 id="qtyTitle">Configurar pedido</h2>
    <p class="qty-subtitle">Selecciona las temporadas o capítulos</p>
    
    <div class="qty-form">
      <label>Temporada:</label>
      <select id="selSeason"></select>
      
      <label>Opción de descarga:</label>
      <select id="selType" onchange="window.toggleCustomCaps()">
        <option value="completa">Temporada Completa</option>
        <option value="serie_completa">Toda la Serie Completa</option>
        <option value="especifico">Capítulos específicos...</option>
      </select>
      
      <textarea id="customCaps" placeholder="Ej: Capítulos 1, 5, 10 al 15..." style="display:none"></textarea>
      
      <button id="btnConfirmAdd" class="btn-red">CONFIRMAR SELECCIÓN</button>
      <button class="btn-flat" onclick="window.closeModals()">CANCELAR</button>
    </div>
  </div>
</div>

<aside id="cart-panel">
  <div class="cart-header">
    <h3>TU LISTA DE PEDIDO</h3>
    <span class="close-cart" onclick="window.toggleCart()">✕</span>
  </div>
  
  <div id="cart-items" class="cart-list">
    </div>
  
  <div class="cart-footer">
    <div class="total-box">
      <span>TOTAL ESTIMADO:</span>
      <span id="cart-total">0 CUP</span>
    </div>
    <button onclick="window.checkout()" class="btn-red btn-block">ENVIAR PEDIDO AHORA</button>
    
    <div id="order-success" class="order-result">
      <p>¡PEDIDO ENVIADO!</p>
      <small>Presenta este código al recoger:</small>
      <h2 id="resCode">#0000</h2>
    </div>
  </div>
</aside>

<script type="module" src="script.js"></script>

</body>
</html>
