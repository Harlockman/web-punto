<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>VideoTeca VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo" id="auth-logo">VIDEOTECA<span>VIP</span></div>
    <p id="auth-msg">Ingresa tus datos para entrar</p>
    
    <input type="text" id="reg-name" placeholder="Nombre completo" style="display:none"/>
    
    <div class="phone-group">
      <span>+53</span>
      <input type="number" id="phone" placeholder="Número móvil"/>
    </div>
    <input type="password" id="pass" placeholder="Contraseña"/>
    
    <div id="auth-err" class="auth-err" style="color:#ff4444; font-size:12px; margin-bottom:10px;"></div>
    
    <button id="btnAuth" class="btn-red">ENTRAR</button>
    <p id="toggleAuth" style="cursor:pointer; margin-top:15px; font-size:14px;"><b>¿No tienes cuenta? Regístrate aquí</b></p>
  </div>
</div>

<div id="app" style="display:none">
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <div class="logo" id="main-logo">VIDEOTECA<span>VIP</span></div>
      <div class="nav-cats" id="nav-cats">
          </div>
    </div>
    <div class="nav-right">
      <div class="search-box">
        <button class="search-btn" onclick="toggleSearch()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <input type="text" id="si" placeholder="Buscar..." oninput="doSearch(this.value)"/>
      </div>
      
      <button class="nbtn" onclick="openOv('ov-news')" style="position:relative">
        <span id="news-dot" class="dot" style="display:none"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9J13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      </button>

      <button class="nbtn" onclick="openOv('ov-cart')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </button>

      <button id="btn-mod" class="nbtn" style="display:none" onclick="openOv('ov-mod')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </button>
      
      <button class="nbtn" onclick="auth.signOut()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </nav>

  <div id="hero"></div>
  <main id="content"></main>

  </div>

<script type="module" src="script.js"></script>
</body>
</html>
