<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>VideoTeca VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>VIDEOTECA<span>VIP</span></h1>
            <p id="auth-msg">Ingresa para continuar</p>
            <input type="text" id="reg-name" placeholder="Nombre" style="display:none">
            <input type="number" id="phone" placeholder="Móvil (8 dígitos)">
            <input type="password" id="pass" placeholder="Contraseña">
            <button id="btnAuth" class="btn-red">INICIAR SESIÓN</button>
            <p onclick="window.toggleAuthMode()" style="cursor:pointer; margin-top:15px; font-size:12px;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <nav id="navbar">
        <div class="logo">VIDEOTECA<span>VIP</span></div>
        <div class="nav-right">
            <span id="uName"></span>
            <button id="mod-btn" style="display:none; background:none; border:none; color:gold; cursor:pointer;" onclick="alert('Panel Mod')">⚙️</button>
            <button onclick="window.userLogout()" class="btn-red" style="padding:5px 10px; font-size:10px;">SALIR</button>
        </div>
    </nav>

    <main id="sections-wrapper">
        </main>

    <div class="modal-overlay" id="modal-details" onclick="window.overlayClose(event,'modal-details')">
        <div class="modal-box">
            <div id="videoBox" class="v-box"></div>
            <div class="modal-body">
                <h1 id="mTitle"></h1>
                <p id="mDesc"></p>
                <button class="btn-red" onclick="window.closeModals()">CERRAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
